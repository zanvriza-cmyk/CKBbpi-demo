<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comma Separator - BPI OPS Tools</title>
    <!-- Favicon Roket Andalan -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col items-center">

    <!-- Top Navigation Bar ala BPI Hub -->
    <div class="w-full bg-emerald-700 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="font-bold text-lg tracking-wide flex items-center">
                <i class="fa-solid fa-rocket mr-3"></i> BPI OPS <span class="font-light opacity-80 ml-1">Portal</span>
            </div>
            <div class="text-[10px] font-bold bg-emerald-800 px-3 py-1.5 rounded-md uppercase tracking-widest border border-emerald-600">
                Utility Tools
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-5xl px-4 py-10 flex flex-col items-center">
        
        <div class="text-center mb-8 w-full max-w-3xl">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">
                Comma Seperator <span class="text-emerald-600">Engine</span>
            </h1>
            <p class="text-sm font-medium text-gray-500">Huh, what a project... what a tools.</p>
        </div>

        <!-- Dashboard Card -->
        <div class="bg-white rounded-xl shadow-xl border border-gray-200 w-full max-w-4xl overflow-hidden">
            
            <!-- Card Header -->
            <div class="bg-slate-800 p-4 border-b border-slate-700 text-white flex items-center justify-between">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-200">
                    <i class="fa-solid fa-table-list text-emerald-400 mr-2"></i> Comma Separator Tool
                </h2>
                <button onclick="clearFields()" class="text-[10px] font-bold bg-slate-700 hover:bg-red-500 hover:text-white text-slate-300 px-3 py-1 rounded transition duration-200 flex items-center">
                    <i class="fa-solid fa-rotate-right mr-1.5"></i> Reset
                </button>
            </div>

            <!-- Card Body -->
            <div class="p-6 md:p-8 bg-gray-50/50">
                <div class="flex flex-col md:flex-row gap-6">
                    
                    <!-- Input Section -->
                    <div class="w-full md:w-[45%] flex flex-col">
                        <label for="inputData" class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 flex justify-between">
                            <span>Raw Data (Excel Column)</span>
                            <i class="fa-solid fa-paste text-gray-400"></i>
                        </label>
                        <textarea id="inputData" rows="12" placeholder="Paste SKU or Code here...&#10;123&#10;456&#10;789" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none resize-none text-sm font-mono shadow-inner bg-white"></textarea>
                    </div>

                    <!-- Action Button Section -->
                    <div class="w-full md:w-[10%] flex flex-col items-center justify-center py-2 md:py-0">
                        <button onclick="generateCommas()" class="group bg-emerald-600 hover:bg-emerald-700 text-white font-bold h-14 w-14 md:h-16 md:w-full rounded-full md:rounded-lg shadow-lg hover:shadow-emerald-500/30 transition-all flex items-center justify-center transform active:scale-95">
                            <i class="fa-solid fa-arrow-right hidden md:block text-xl group-hover:translate-x-1 transition-transform"></i>
                            <i class="fa-solid fa-arrow-down md:hidden text-xl group-hover:translate-y-1 transition-transform"></i>
                        </button>
                        <span class="text-[10px] font-bold text-gray-400 mt-3 uppercase tracking-widest md:hidden">Convert</span>
                    </div>

                    <!-- Output Section -->
                    <div class="w-full md:w-[45%] flex flex-col">
                        <div class="flex justify-between items-end mb-2">
                            <label for="outputData" class="text-xs font-bold text-gray-500 uppercase tracking-wide">
                                Formatted Result
                            </label>
                            <span id="countIndicator" class="text-[10px] font-bold bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded hidden">0 Items</span>
                        </div>
                        <textarea id="outputData" rows="12" readonly placeholder="Result will appear here...&#10;123,456,789" class="w-full p-4 border border-gray-300 rounded-lg bg-gray-100 outline-none resize-none text-sm font-mono text-gray-700 shadow-inner cursor-not-allowed"></textarea>
                        
                        <button id="copyBtn" onclick="copyToClipboard()" class="mt-4 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg shadow-md transition flex items-center justify-center gap-2 text-sm hidden transform active:scale-95">
                            <i class="fa-regular fa-copy"></i> Copy to Clipboard
                        </button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        function generateCommas() {
            const input = document.getElementById('inputData').value;
            
            const dataArray = input.split('\n')
                                   .map(item => item.trim())
                                   .filter(item => item !== '');
            
            if (dataArray.length === 0) {
                alert("Please paste some data first!");
                return;
            }

            const result = dataArray.join(',');
            
            document.getElementById('outputData').value = result;
            
            document.getElementById('copyBtn').classList.remove('hidden');
            const countIndicator = document.getElementById('countIndicator');
            countIndicator.innerText = `${dataArray.length} Items`;
            countIndicator.classList.remove('hidden');
        }

        function copyToClipboard() {
            const outputElement = document.getElementById('outputData');
            
            outputElement.select();
            outputElement.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(outputElement.value).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied Successfully!';
                btn.classList.replace('bg-slate-800', 'bg-emerald-600');
                btn.classList.replace('hover:bg-slate-900', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-emerald-600', 'bg-slate-800');
                    btn.classList.replace('hover:bg-emerald-700', 'hover:bg-slate-900');
                }, 2000);
            });
        }

        function clearFields() {
            document.getElementById('inputData').value = '';
            document.getElementById('outputData').value = '';
            document.getElementById('copyBtn').classList.add('hidden');
            document.getElementById('countIndicator').classList.add('hidden');
            document.getElementById('inputData').focus();
        }
    </script>
</body>
</html>
