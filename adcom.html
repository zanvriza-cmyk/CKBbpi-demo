<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comma Separator Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-12 px-4">

    <div class="text-center mb-8 w-full max-w-3xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            <i class="fa-solid fa-table-list text-green-600 mr-2"></i>Comma Separator Tool
        </h1>
        <p class="text-gray-500">Paste your Excel column data below and instantly convert it into a comma-separated line.</p>
    </div>

    <div class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-200 w-full max-w-3xl">
        
        <div class="flex flex-col md:flex-row gap-4">
            <div class="w-full md:w-1/2 flex flex-col">
                <label for="inputData" class="font-semibold text-gray-700 mb-2">Input Data (Paste from Excel):</label>
                <textarea id="inputData" rows="10" placeholder="123&#10;456&#10;789" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none resize-none text-sm font-mono"></textarea>
            </div>

            <div class="flex items-center justify-center py-4 md:py-0">
                <button onclick="generateCommas()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition flex items-center gap-2 transform active:scale-95">
                    Generate <i class="fa-solid fa-arrow-right hidden md:inline"></i><i class="fa-solid fa-arrow-down md:hidden"></i>
                </button>
            </div>

            <div class="w-full md:w-1/2 flex flex-col">
                <label for="outputData" class="font-semibold text-gray-700 mb-2">Result (Comma Separated):</label>
                <textarea id="outputData" rows="10" readonly placeholder="123,456,789" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 outline-none resize-none text-sm font-mono text-gray-700"></textarea>
                
                <button id="copyBtn" onclick="copyToClipboard()" class="mt-3 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-lg shadow transition flex items-center justify-center gap-2 text-sm hidden">
                    <i class="fa-regular fa-copy"></i> Copy Result
                </button>
            </div>
        </div>
        
        <div class="mt-4 flex items-center justify-between">
            <button onclick="clearFields()" class="text-gray-500 hover:text-red-500 font-medium text-sm transition">
                <i class="fa-solid fa-trash-can mr-1"></i> Clear Fields
            </button>
            <span id="countIndicator" class="text-sm font-semibold text-green-600 hidden"></span>
        </div>

    </div>

    <script>
        function generateCommas() {
            const input = document.getElementById('inputData').value;
            
            // Logika pemisah:
            // 1. Split berdasarkan garis baru (\n)
            // 2. Map: hapus spasi/tab di awal & akhir setiap kata (trim)
            // 3. Filter: buang baris yang kosong
            // 4. Join: gabungkan semua dengan koma
            const dataArray = input.split('\n')
                                   .map(item => item.trim())
                                   .filter(item => item !== '');
            
            if (dataArray.length === 0) {
                alert("Please paste some data first!");
                return;
            }

            const result = dataArray.join(',');
            
            // Tampilkan hasil
            document.getElementById('outputData').value = result;
            
            // Tampilkan tombol copy & indikator jumlah data
            document.getElementById('copyBtn').classList.remove('hidden');
            const countIndicator = document.getElementById('countIndicator');
            countIndicator.innerText = `Total items: ${dataArray.length}`;
            countIndicator.classList.remove('hidden');
        }

        function copyToClipboard() {
            const outputElement = document.getElementById('outputData');
            
            // Select text dan copy
            outputElement.select();
            outputElement.setSelectionRange(0, 99999); // Untuk support mobile
            navigator.clipboard.writeText(outputElement.value).then(() => {
                // Efek visual sukses
                const btn = document.getElementById('copyBtn');
                const originalHtml = btn.innerHTML;
                
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                btn.classList.replace('bg-gray-800', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-green-600', 'bg-gray-800');
                }, 2000);
            });
        }

        function clearFields() {
            document.getElementById('inputData').value = '';
            document.getElementById('outputData').value = '';
            document.getElementById('copyBtn').classList.add('hidden');
            document.getElementById('countIndicator').classList.add('hidden');
            document.getElementById('inputData').focus();
        }
    </script>
</body>
</html>
